name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest build
          python -m pip install -e .

      - name: Run test suite via Pytest
        run: |
          pytest

      - name: Verify package build
        run: |
          python -m build

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 4

    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install build

      - name: Build distribution
        run: |
          python -m build

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            --generate-notes

  publish-pypi:
    name: Publish on PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: release

    environment:
      name: pypi

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-binaries:
    name: Build executables
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    needs: publish-pypi

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            archive: pyllo-linux-x86_64.tar.gz

          - os: windows-latest
            archive: pyllo-windows-x86_64.zip

          - os: macos-latest
            archive: pyllo-macos-x86_64.tar.gz

      steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.13"
            cache: pip

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install pyinstaller
            python -m pip install -e .

        - name: Build executable
          run: |
            pyinstaller \
              --onefile \
              --clean \
              --noconfirm \
              --name pyllo \
              src/pyllo_greeting/cli.py

        - name: Package executable (Linux/macOS)
          if: runner.os != 'Windows'
          run: |
            tar -czf "${{ matrix.archive }}" \
              -C dist \
              pyllo

        - name: Package executable (Windows)
          if: runner.os == 'Windows'
          shell: pwsh
          run: |
            Compress-Archive `
              -Path dist\pyllo.exe `
              -DestinationPath "${{ matrix.archive }}"

        - name: Upload packaged executable
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.archive }}
            path: ${{ matrix.archive }}

  upload-binaries:
    name: Upload executables to Release

    runs-on: ubuntu-latest

    needs: build-binaries

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload executables to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f -print

          gh release upload "${{ github.ref_name }}" \
            artifacts/**/* \
            --clobber